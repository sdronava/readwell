services:

  # ── PostgreSQL (dev database) ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: readwell
      POSTGRES_USER: readwell
      POSTGRES_PASSWORD: readwell_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readwell"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Conversion worker (production target) ─────────────────────────────────
  worker:
    build:
      context: .
      target: production
    environment:
      DB_URL: postgresql+psycopg2://readwell:readwell_dev@db:5432/readwell
      STORAGE_BACKEND: local
      BOOKS_OUTPUT_DIR: /books
      POLL_INTERVAL_SECONDS: "5"
    volumes:
      - books_data:/books
      - uploads_data:/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ── Test runner ────────────────────────────────────────────────────────────
  test:
    build:
      context: .
      target: test
    profiles:
      - test   # only runs when: docker compose --profile test up test

volumes:
  postgres_data:
  books_data:
  uploads_data:
